<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EquiControl - Prijzen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif; }
    header { padding: 20px 24px; border-bottom: 1px solid #222; }
    header h1 { color: #D4AF37; font-family: Georgia; font-size: 24px; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
    h2 { text-align: center; font-size: 32px; margin-bottom: 12px; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 48px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 28px 20px; text-align: center; }
    .card.featured { border-color: #D4AF37; }
    .card h3 { font-size: 20px; margin-bottom: 8px; }
    .card .prijs { font-size: 36px; font-weight: bold; color: #D4AF37; margin: 16px 0; }
    .card .prijs span { font-size: 16px; color: rgba(255,255,255,0.5); }
    .card p { color: rgba(255,255,255,0.6); margin-bottom: 24px; font-size: 14px; }
    .btn { display: block; background: #D4AF37; color: #000; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 16px; text-decoration: none; cursor: pointer; border: none; width: 100%; }
    .btn-outline { background: transparent; color: #D4AF37; border: 1px solid #D4AF37; }
    .badge { background: #D4AF37; color: #000; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>EquiControl</h1>
  </header>
  <div class="container">
    <h2>Kies je pakket</h2>
    <p class="subtitle">Analyseer je training met AI — eerlijk geprijsd</p>
    
    <div class="cards">
      <div class="card featured">
        <div class="badge">POPULAIR</div>
        <h3>Starter</h3>
        <div class="prijs">€9,99<span>/maand</span></div>
        <p>5 analyses per maand — ideaal om te beginnen</p>
        <button class="btn" onclick="koop('starter')">Kies Starter</button>
      </div>
      <div class="card">
        <h3>1 Analyse</h3>
        <div class="prijs">€2,99</div>
        <p>Eenmalig 1 extra analyse</p>
        <button class="btn btn-outline" onclick="koop('extra1')">Koop</button>
      </div>
      <div class="card">
        <h3>3 Analyses</h3>
        <div class="prijs">€5,99</div>
        <p>Eenmalig 3 extra analyses</p>
        <button class="btn btn-outline" onclick="koop('extra3')">Koop</button>
      </div>
      <div class="card">
        <h3>10 Analyses</h3>
        <div class="prijs">€14,99</div>
        <p>Eenmalig 10 extra analyses</p>
        <button class="btn btn-outline" onclick="koop('extra10')">Koop</button>
      </div>
    </div>
  </div>

  <script>
    function getUrlParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    async function koop(pakket) {
      const userId = getUrlParam('userId');
      const userEmail = getUrlParam('email');
      
      if (!userId) {
        alert('Log eerst in via de EquiControl app');
        return;
      }

      try {
        const response = await fetch('/api/betaling', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pakket, userId, userEmail })
        });

        const data = await response.json();
        if (data.betalingUrl) {
          window.location.href = data.betalingUrl;
        } else {
          alert('Fout bij aanmaken betaling: ' + data.error);
        }
      } catch (error) {
        alert('Fout: ' + error.message);
      }
    }
  </script>
</body>
</html>
